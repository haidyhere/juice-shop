name: SAST Scan

on:
  push:
  workflow_dispatch:

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --json > sast-result.json

      - name: Send results to backend
        run: python3 .scanner/scripts/send_sast.py
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
          INGEST_TOKEN_SAST: ${{ secrets.INGEST_TOKEN_SAST }}
          S3_KEY: "sast-reports/${{ github.repository }}-${{ github.run_id }}.json"